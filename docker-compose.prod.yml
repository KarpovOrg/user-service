services:
  user-service:
    image: ${IMAGE_NAME}:${IMAGE_TAG}
    container_name: user-service
    restart: unless-stopped
    env_file:
      - .env.prod
    ports:
      - "8001:8000"
    networks:
      - traefik-net
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-net"
      - "traefik.http.routers.user-service.rule=Host(`karpov1.duckdns.org`) && PathPrefix(`/api/v1/users`)"
      - "traefik.http.routers.user-service.entrypoints=websecure"
      - "traefik.http.routers.user-service.tls.certresolver=letsencrypt"
      - "traefik.http.services.user-service.loadbalancer.server.port=8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/users/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  migrate:
    image: ${IMAGE_NAME}:${IMAGE_TAG}
    container_name: user-service-migrate
    restart: "no"
    env_file:
      - .env.prod
    command: ["python", "-m", "alembic", "upgrade", "head"]
    networks:
      - internal

networks:
  traefik-net:
    external: true
  internal:
    external: true

