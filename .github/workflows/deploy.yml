name: CI/CD — Test → Build → Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]    # тесты запускаются на PR, деплоя нет

jobs:

  # ─── Тесты (запускаются и на PR, и на push в main) ────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Устанавливаем зависимости
        run: pip install -e ".[dev]"

      - name: Запускаем тесты
        run: pytest src/tests/ -v --tb=short --cov=src --cov-report=term-missing

  # ─── Сборка Docker-образа → GitHub Container Registry (ghcr.io) ──────────
  # Запускается ТОЛЬКО при push в main (не на PR)
  build:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Формируем имя образа (lowercase для ghcr.io)
        id: meta
        run: |
          IMAGE="ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          echo "image=$IMAGE" >> $GITHUB_OUTPUT
          echo "IMAGE_NAME=$IMAGE" >> $GITHUB_ENV

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest

  # ─── Деплой на VPS через SSH ──────────────────────────────────────────────
  # Запускается ТОЛЬКО при push в main (не на PR)
  deploy:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://karpov1.duckdns.org

    steps:
      - uses: actions/checkout@v4

      - name: Формируем имя образа (lowercase для ghcr.io)
        run: |
          echo "IMAGE_NAME=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Настраиваем SSH (для scp)
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Копируем docker-compose.prod.yml на сервер
        run: |
          scp -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            docker-compose.prod.yml \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ secrets.SERVICE_DIR }}/docker-compose.prod.yml"

      # appleboy/ssh-action — не использует heredoc, нет проблем с YAML отступами
      - name: Деплоим
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          IMAGE_TAG: ${{ github.sha }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GHCR_USER: ${{ secrets.GHCR_USER }}
          SERVICE_DIR: ${{ secrets.SERVICE_DIR }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: IMAGE_NAME,IMAGE_TAG,GHCR_TOKEN,GHCR_USER,SERVICE_DIR
          script: |
            set -e
            cd "$SERVICE_DIR"

            # Логинимся в ghcr.io
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

            # Скачиваем новый образ
            # ↓ Замените my-service на имя вашего сервиса
            IMAGE_NAME="$IMAGE_NAME" IMAGE_TAG="$IMAGE_TAG" \
              docker compose -f docker-compose.prod.yml pull user-service

            # Перезапускаем сервис
            # ↓ Замените my-service на имя вашего сервиса
            IMAGE_NAME="$IMAGE_NAME" IMAGE_TAG="$IMAGE_TAG" \
              docker compose -f docker-compose.prod.yml up -d --no-deps user-service

            docker image prune -f
            echo "✅ Deploy completed!"