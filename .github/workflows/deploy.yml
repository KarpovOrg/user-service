name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

# Только один деплой одновременно — следующий отменяет предыдущий
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  # Имя образа: ghcr.io/ВАШ_ORГ/user-service
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/user-service

jobs:
  # ─── 1. ТЕСТЫ ─────────────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        env:
          USER_CONFIG__APP__APP_NAME: "user-service-test"
          USER_CONFIG__APP__DEBUG: "true"
          USER_CONFIG__DB__URL: "sqlite+aiosqlite:///:memory:"
        run: pytest src/tests/ -v

  # ─── 2. СБОРКА И ПУБЛИКАЦИЯ ОБРАЗА ────────────────────────────────────────
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test                          # запускается только если тесты прошли

    # ОБЯЗАТЕЛЬНО: без этого GITHUB_TOKEN не может пушить пакеты в организацию
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Docker требует lowercase — KarpovOrg → karpovorg
      - name: Set lowercase image name
        run: echo "IMAGE_NAME=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/user-service" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}  # встроенный токен, ничего добавлять не нужно

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ─── 3. ДЕПЛОЙ НА СЕРВЕР ─────────────────────────────────────────────────
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build                         # запускается только если сборка прошла

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Docker требует lowercase — KarpovOrg → karpovorg
      - name: Set lowercase image name
        run: echo "IMAGE_NAME=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/user-service" >> $GITHUB_ENV

      # Настраиваем SSH-ключ для подключения к серверу
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      # Копируем docker-compose.prod.yml на сервер
      - name: Copy docker-compose to server
        run: |
          scp -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            docker-compose.prod.yml \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ secrets.SERVICE_DIR }}/docker-compose.prod.yml

      - name: Deploy service on VPS
        run: |
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'ENDSSH'
            set -x

            cd ${{ secrets.SERVICE_DIR }}

            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io \
              -u "${{ secrets.GHCR_USER }}" --password-stdin

            export IMAGE_NAME="${{ env.IMAGE_NAME }}"
            export IMAGE_TAG="sha-$(echo ${{ github.sha }} | cut -c1-7)"

            echo "IMAGE_NAME=${IMAGE_NAME}" > .env
            echo "IMAGE_TAG=${IMAGE_TAG}" >> .env
            cat .env

            docker compose -f docker-compose.prod.yml pull user-service

            docker rm -f user-service         2>/dev/null || true
            docker rm -f user-service-migrate 2>/dev/null || true

            if docker compose -f docker-compose.prod.yml run --rm migrate python -m alembic upgrade head; then
              echo "✅ Миграции применены"
            else
              echo "⚠️ upgrade head не прошёл, ставим stamp head..."
              docker compose -f docker-compose.prod.yml run --rm migrate python -m alembic stamp head || true
            fi

            echo "=== Запускаем контейнер через docker run ==="
            docker run -d \
              --name user-service \
              --restart unless-stopped \
              --env-file .env.prod \
              -p 8000:8000 \
              --network internal \
              --network traefik-net \
              --label traefik.enable=true \
              --label traefik.docker.network=traefik-net \
              --label "traefik.http.routers.user-service.rule=PathPrefix(\`/api/v1\`)" \
              --label traefik.http.routers.user-service.entrypoints=websecure \
              --label traefik.http.routers.user-service.tls.certresolver=letsencrypt \
              --label traefik.http.services.user-service.loadbalancer.server.port=8000 \
              --health-cmd "curl -f http://localhost:8000/api/v1/health/ || exit 1" \
              --health-interval 30s \
              --health-timeout 10s \
              --health-retries 3 \
              --health-start-period 15s \
              ${IMAGE_NAME}:${IMAGE_TAG}

            RUN_EXIT=$?
            echo "=== docker run exit code: $RUN_EXIT ==="

            if [ $RUN_EXIT -ne 0 ]; then
              echo "❌ docker run завершился с ошибкой $RUN_EXIT"
              exit 1
            fi

            sleep 5
            docker ps

            if ! docker ps --format "{{.Names}}" | grep -qx "user-service"; then
              echo "❌ Контейнер user-service не запустился!"
              docker logs user-service --tail=50 2>&1 || true
              exit 1
            fi

            echo "✅ Деплой завершён: $(docker ps --format '{{.Image}}' --filter name=user-service)"
          ENDSSH
